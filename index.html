<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
}

.cover{
    position:relative;
    width:100%;
    height:100vh;
    background:url('cover.jpg') center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.18);
}

.content{
    position:relative;
    z-index:2;
    text-align:center;
    color:#fff;
    width:90%;
    max-width:500px;
    animation:fadeIn 1.5s ease;
}

.pretitle{
    letter-spacing:4px;
    font-size:13px;
    margin-bottom:15px;
}

.title{
    font-family:'Cormorant Garamond',serif;
    font-size:52px;
    font-weight:700;
    line-height:1.1;
    margin-bottom:30px;
}

.kepada{
    font-size:15px;
    margin-bottom:8px;
}

.guest{
    font-size:26px;
    font-weight:600;
    margin-bottom:35px;
    padding:0 10px;
}

.btn{
    display:inline-block;
    background:#ffffff;
    color:#222;
    text-decoration:none;
    padding:14px 34px;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.btn:hover{
    transform:translateY(-3px);
}

.note{
    margin-top:25px;
    font-size:12px;
    opacity:.9;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .title{
        font-size:40px;
    }

    .guest{
        font-size:22px;
    }

    .btn{
        width:220px;
    }

}

</style>

</head>

<body>

<div class="cover">

```
<div class="overlay"></div>

<div class="content">

    <div>         
    </div>
         
    <div class="kepada">
        Kepada Yth.
    </div>

    <div class="guest" id="guestName">
        Tamu Undangan
    </div>

    <a
        href="https://undangantiadeki.my.canva.site/molanudhon"
        target="_blank"
        class="btn"
        onclick="playMusic()">
        Buka Undangan
    </a>

    <div class="note">
        Mohon berkenan memaklumi apabila terdapat kekeliruan
            penulisan nama dan gelar
    </div>

</div>
```

</div>

<audio id="bgMusic" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

// Nama tamu dari URL
const params = new URLSearchParams(window.location.search);
const guest = params.get("to");

if(guest){
    document.getElementById("guestName").innerHTML =
    decodeURIComponent(guest);
}

// Memutar musik saat tombol ditekan
function playMusic(){
    const music = document.getElementById("bgMusic");

    music.play().catch(function(error){
        console.log(error);
    });
}

</script>

</body>
</html>
